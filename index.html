<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced PDF Tools Pro</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:white; padding:15px; display:flex; justify-content:space-between; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
h1 { color:#E5322D; }

.hero { text-align:center; padding:40px; background:white; }
.btn { background:#E5322D; color:white; padding:15px 30px; font-size:18px; border:none; border-radius:8px; cursor:pointer; margin:5px; }

.tools { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px; }
.tool { background:white; padding:20px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); }

.upload-box { border:2px dashed #aaa; padding:30px; text-align:center; margin:20px; background:white; }

footer { background:#222; color:white; text-align:center; padding:15px; }
</style>
</head>
<body>

<header>
<h1>PDF Tools Pro</h1>
</header>

<section class="hero">
<h1>All-in-One PDF Tools</h1>
<p>Merge, Convert, Resize & More</p>
<button class="btn" onclick="openTool('merge')">Select File</button>
</section>

<section class="tools">
<div class="tool"><h3>PDF to Image</h3><button class="btn" onclick="openTool('pdf2img')">Open</button></div>
<div class="tool"><h3>Image to PDF</h3><button class="btn" onclick="openTool('img2pdf')">Open</button></div>
<div class="tool"><h3>Resize PDF</h3><button class="btn" onclick="openTool('resize')">Open</button></div>
<div class="tool"><h3>Compress PDF</h3><button class="btn" onclick="openTool('compress')">Open</button></div>
</section>

<section id="toolPage" style="display:none;">
<h2 id="toolTitle" style="text-align:center"></h2>
<div class="upload-box">
<input type="file" id="fileInput" multiple>
</div>
<button class="btn" onclick="processFile()">Process</button>
<p id="result"></p>
</section>

<footer>
<p>© 2026 PDF Tools Pro | Free & Secure</p>
</footer>

<script>
let currentTool='';
function openTool(tool){ currentTool=tool; document.getElementById('toolPage').style.display='block'; document.getElementById('toolTitle').innerText=tool; }

async function processFile(){
 const { PDFDocument } = PDFLib;
 const { jsPDF } = window.jspdf;
 let file = document.getElementById('fileInput').files[0];
 if(!file){ alert('Upload file'); return; }

 if(currentTool==='resize'){
  let pdf = await PDFDocument.load(await file.arrayBuffer());
  pdf.getPages().forEach(p=>p.setSize(p.getWidth()*0.7,p.getHeight()*0.7));
  download(await pdf.save(),'resized.pdf');
 }

 if(currentTool==='img2pdf'){
  let img = await file.arrayBuffer();
  let pdf = await PDFDocument.create();
  let image = await pdf.embedJpg(img).catch(async ()=> await pdf.embedPng(img));
  let page = pdf.addPage([image.width,image.height]);
  page.drawImage(image,{x:0,y:0,width:image.width,height:image.height});
  download(await pdf.save(),'image-to-pdf.pdf');
 }

 if(currentTool==='pdf2img'){
  alert('PDF to Image requires backend or advanced lib');
 }

 if(currentTool==='compress'){
  let pdf = await PDFDocument.load(await file.arrayBuffer());
  download(await pdf.save({useObjectStreams:true}),'compressed.pdf');
 }

 document.getElementById('result').innerText='Done ✅';
}

function download(data,name){
 let blob = new Blob([data]);
 let url = URL.createObjectURL(blob);
 let a = document.createElement('a');
 a.href=url; a.download=name; a.click();
}
</script>

</body>
</html>
